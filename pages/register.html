<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>

    <link rel="stylesheet" href="/css/general.css" />
    <link rel="stylesheet" href="/css/register.css" />
  </head>

  <body>
    <header>
      <div class="container">
        <nav>
          <div class="logo">
            <img src="/img/icon.svg" alt="logo" />
            <a href="/pages/index.html">Charitor.ai</a>
          </div>

          <ul class="nav">
            <li><a href="/pages/register.html">Зарегистрироваться</a></li>
            <li><a href="/pages/autorization.html">Войти</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="register-page">
      <div class="register-card">
        <h1>Регистрация</h1>

        <form class="register-form" id="registerForm">
          <label for="username">Имя пользователя</label>
          <input
            type="text"
            id="username"
            placeholder="Введите имя пользователя"
            required
          />

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Введите email" required />

          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            placeholder="Введите пароль"
            required
          />

          <label for="repeat-password">Повторите пароль</label>
          <input
            type="password"
            id="repeat-password"
            placeholder="Повторите пароль"
            required
          />

          <label class="checkbox">
            <input type="checkbox" id="agree" />
            <span>
              Я подтверждаю, что мне 18 лет или больше и я согласен с
              <a href="#">Условиями предоставления услуг</a>
              и
              <a href="#">Политикой конфиденциальности</a>
            </span>
          </label>

          <button type="submit" class="btn-main">Создать аккаунт</button>

          <p class="login-text">Уже есть аккаунт?</p>

          <a href="/pages/autorization.html" class="btn-second">
            Авторизация
          </a>
        </form>
      </div>
    </main>

    <script>
      const form = document.getElementById("registerForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const repeatPassword = document
          .getElementById("repeat-password")
          .value.trim();
        const agree = document.getElementById("agree").checked;

        if (!username || !email || !password || !repeatPassword) {
          alert("Заполните все поля");
          return;
        }

        if (password !== repeatPassword) {
          alert("Пароли не совпадают");
          return;
        }

        if (!agree) {
          alert("Подтвердите согласие с условиями");
          return;
        }

        try {
          const response = await fetch("http://localhost:3000/register", {
            method: "POST",
            mode: "cors",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username,
              email,
              password,
            }),
          });

          const contentType = response.headers.get("content-type") || "";
          const text = await response.text();

          console.log("STATUS:", response.status);
          console.log("CONTENT-TYPE:", contentType);
          console.log("RAW RESPONSE:", text);

          if (!contentType.includes("application/json")) {
            alert("Сервер вернул не JSON. Открой консоль браузера.");
            return;
          }

          const data = JSON.parse(text);
          alert(data.message);

          if (response.ok) {
            window.location.href = "/pages/autorization.html";
          }
        } catch (error) {
          console.error("Ошибка fetch:", error);
          alert("Ошибка соединения: " + error.message);
        }
      });
    </script>
  </body>
</html>
