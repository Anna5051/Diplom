<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Персоны — Charitor.ai</title>
  <link rel="stylesheet" href="/css/general.css" />
  <link rel="stylesheet" href="/css/person.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="/pages/main.html" class="brand">Charitor.ai</a>
      <a href="/pages/main.html" class="top-link">← На главную</a>
    </div>

    <div class="search-box">
      <input id="searchPersonaInput" type="text" placeholder="Поиск персон..." />
      <button type="button">⌕</button>
    </div>

    <div class="topbar-right">
      <a href="/pages/profile.html" class="profile-mini">
        <img id="topAvatar" src="/img/icon.svg" alt="avatar" />
      </a>
    </div>
  </header>

  <main class="person-page">
    <section class="person-head">
      <div>
        <p class="eyebrow">Persona Manager</p>
        <h1>Мои персоны</h1>
        <p>
          Создавай разные образы для общения с персонажами. Например: принцесса,
          студент, маг, злодей или обычный пользователь.
        </p>
      </div>

      <button class="create-persona-btn" id="openCreateBtn" type="button">
        + Создать персону
      </button>
    </section>

    <section class="persona-tabs">
      <button class="tab-btn active" data-filter="all">Все персоны</button>
      <button class="tab-btn" data-filter="default">Основная</button>
    </section>

    <section class="persona-grid" id="personaGrid"></section>

    <p class="empty-state" id="emptyState">Персоны пока не созданы</p>
  </main>

  <div class="modal-overlay" id="personaModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Создать персону</h2>
        <button type="button" id="closeModalBtn">×</button>
      </div>

      <div class="modal-body">
        <div class="avatar-column">
          <img id="avatarPreview" src="/img/icon.svg" alt="avatar" />
          <label class="avatar-upload">
            Загрузить фото
            <input id="avatarInput" type="file" accept="image/*" hidden />
          </label>
        </div>

        <div class="form-column">
          <label>Имя персоны *</label>
          <input id="personaName" type="text" placeholder="Например: Azula" />

          <label>Краткий тип / роль</label>
          <input id="personaRole" type="text" placeholder="Например: Fire Princess" />

          <label>Описание *</label>
          <textarea
            id="personaDescription"
            placeholder="Опиши, кто эта персона, её характер, внешность, стиль общения и роль в сюжете..."
          ></textarea>

          <label class="check-row">
            <input id="personaDefault" type="checkbox" />
            Сделать основной персоной
          </label>
        </div>
      </div>

      <div class="modal-footer">
        <button class="delete-btn" id="deletePersonaBtn" type="button">Удалить</button>

        <div>
          <button class="cancel-btn" id="cancelBtn" type="button">Отмена</button>
          <button class="save-btn" id="savePersonaBtn" type="button">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:3000";
    const savedUser = JSON.parse(localStorage.getItem("user") || "null");

    if (!savedUser) {
      window.location.href = "/pages/autorization.html";
    }

    const topAvatar = document.getElementById("topAvatar");
    const searchPersonaInput = document.getElementById("searchPersonaInput");
    const personaGrid = document.getElementById("personaGrid");
    const emptyState = document.getElementById("emptyState");

    const personaModal = document.getElementById("personaModal");
    const modalTitle = document.getElementById("modalTitle");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const openCreateBtn = document.getElementById("openCreateBtn");

    const avatarPreview = document.getElementById("avatarPreview");
    const avatarInput = document.getElementById("avatarInput");
    const personaName = document.getElementById("personaName");
    const personaRole = document.getElementById("personaRole");
    const personaDescription = document.getElementById("personaDescription");
    const personaDefault = document.getElementById("personaDefault");

    const savePersonaBtn = document.getElementById("savePersonaBtn");
    const deletePersonaBtn = document.getElementById("deletePersonaBtn");

    let personas = [];
    let currentEditId = null;
    let avatarValue = "";
    let currentFilter = "all";

    const savedAvatar =
      localStorage.getItem(`profileAvatar_${savedUser.id}`) ||
      savedUser.avatar_url ||
      "";

    if (savedAvatar) {
      topAvatar.src = savedAvatar;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function openModal(persona = null) {
      personaModal.classList.add("active");

      if (persona) {
        currentEditId = persona.id;
        modalTitle.textContent = "Редактировать персону";
        deletePersonaBtn.style.display = "inline-flex";

        personaName.value = persona.name || "";
        personaRole.value = persona.role || "";
        personaDescription.value = persona.description || "";
        personaDefault.checked = Number(persona.is_default) === 1;

        avatarValue = persona.avatar_url || "";
        avatarPreview.src = avatarValue || "/img/icon.svg";
      } else {
        currentEditId = null;
        modalTitle.textContent = "Создать персону";
        deletePersonaBtn.style.display = "none";

        personaName.value = "";
        personaRole.value = "";
        personaDescription.value = "";
        personaDefault.checked = personas.length === 0;

        avatarValue = "";
        avatarPreview.src = "/img/icon.svg";
      }
    }

    function closeModal() {
      personaModal.classList.remove("active");
    }

    function renderPersonas() {
      const query = searchPersonaInput.value.trim().toLowerCase();

      let filtered = [...personas];

      if (currentFilter === "default") {
        filtered = filtered.filter((item) => Number(item.is_default) === 1);
      }

      if (query) {
        filtered = filtered.filter((item) =>
          [item.name, item.role, item.description]
            .join(" ")
            .toLowerCase()
            .includes(query)
        );
      }

      personaGrid.innerHTML = "";

      if (!filtered.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      filtered.forEach((persona) => {
        const card = document.createElement("article");
        card.className = "persona-card";

        card.innerHTML = `
          <button class="edit-persona-btn" type="button" data-id="${persona.id}">
            ✎
          </button>

          <div class="persona-image">
            <img src="${persona.avatar_url || "/img/icon.svg"}" alt="persona" />
          </div>

          <div class="persona-info">
            <div class="persona-title">
              <h3>${escapeHtml(persona.name)}</h3>
              ${
                Number(persona.is_default) === 1
                  ? `<span>Основная</span>`
                  : ""
              }
            </div>

            <p class="persona-role">${escapeHtml(persona.role || "Без роли")}</p>

            <p class="persona-desc">
              ${escapeHtml(persona.description || "Описание отсутствует")}
            </p>

            <div class="persona-actions">
              <button class="use-btn" type="button" data-id="${persona.id}">
                Использовать
              </button>
              <button class="set-default-btn" type="button" data-id="${persona.id}">
                Сделать основной
              </button>
            </div>
          </div>
        `;

        personaGrid.appendChild(card);
      });

      document.querySelectorAll(".edit-persona-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = Number(btn.dataset.id);
          const persona = personas.find((item) => Number(item.id) === id);
          openModal(persona);
        });
      });

      document.querySelectorAll(".use-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = Number(btn.dataset.id);
          localStorage.setItem(`selectedPersona_${savedUser.id}`, String(id));
          alert("Персона выбрана для чата ✅");
        });
      });

      document.querySelectorAll(".set-default-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.dataset.id);
          await setDefaultPersona(id);
        });
      });
    }

    async function loadPersonas() {
      try {
        const response = await fetch(`${API_URL}/personas/${savedUser.id}`);

        if (!response.ok) {
          throw new Error("Ошибка загрузки персон");
        }

        personas = await response.json();
        renderPersonas();
      } catch (error) {
        console.error(error);
        personas = [];
        renderPersonas();
      }
    }

    async function savePersona() {
      const name = personaName.value.trim();
      const role = personaRole.value.trim();
      const description = personaDescription.value.trim();

      if (!name || !description) {
        alert("Заполните имя и описание персоны");
        return;
      }

      const payload = {
        user_id: savedUser.id,
        name,
        role,
        description,
        avatar_url: avatarValue,
        is_default: personaDefault.checked ? 1 : 0
      };

      try {
        let response;

        if (currentEditId) {
          response = await fetch(`${API_URL}/persona/${currentEditId}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });
        } else {
          response = await fetch(`${API_URL}/persona`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });
        }

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Ошибка сохранения");
          return;
        }

        closeModal();
        await loadPersonas();
      } catch (error) {
        console.error(error);
        alert("Ошибка соединения с сервером");
      }
    }

    async function deletePersona() {
      if (!currentEditId) return;

      const ok = confirm("Удалить эту персону?");
      if (!ok) return;

      try {
        const response = await fetch(`${API_URL}/persona/${currentEditId}`, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: savedUser.id
          })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Ошибка удаления");
          return;
        }

        closeModal();
        await loadPersonas();
      } catch (error) {
        console.error(error);
        alert("Ошибка удаления");
      }
    }

    async function setDefaultPersona(id) {
      try {
        const response = await fetch(`${API_URL}/persona/${id}/default`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: savedUser.id
          })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Ошибка");
          return;
        }

        await loadPersonas();
      } catch (error) {
        console.error(error);
        alert("Ошибка выбора основной персоны");
      }
    }

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = (event) => {
        avatarValue = event.target.result;
        avatarPreview.src = avatarValue;
      };

      reader.readAsDataURL(file);
    });

    openCreateBtn.addEventListener("click", () => openModal());
    closeModalBtn.addEventListener("click", closeModal);
    cancelBtn.addEventListener("click", closeModal);
    savePersonaBtn.addEventListener("click", savePersona);
    deletePersonaBtn.addEventListener("click", deletePersona);

    searchPersonaInput.addEventListener("input", renderPersonas);

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((item) => {
          item.classList.remove("active");
        });

        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderPersonas();
      });
    });

    loadPersonas();
  </script>
</body>
</html>
